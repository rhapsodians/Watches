name: Daily Watch Search

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create reports dir (always runs)
        if: always()
        run: |
          mkdir -p reports
          echo "=== Workflow started $(date -u) ===" > reports/run.log

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>&1 | tee -a reports/run.log

      - name: Install Playwright browser
        run: playwright install chromium --with-deps 2>&1 | tee -a reports/run.log

      - name: Restore seen-listings database
        uses: actions/cache@v4
        with:
          path: |
            data/seen_listings.db
            data/watchfinder_ids.json
          key: watchbot-state-${{ github.run_id }}
          restore-keys: |
            watchbot-state-

      - name: Run search
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          set -o pipefail
          python run.py search 2>&1 | tee -a reports/run.log

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchbot-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
